<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#080d14"/>
    </radialGradient>
    <linearGradient id="hub" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%"   stop-color="#d0e0f0"/>
      <stop offset="100%" stop-color="#8aadcc"/>
    </linearGradient>
    <!-- Single blade shape pointing upward from center, with a slight twist -->
    <path id="blade"
          d="M24,24 C19,21 15,12 21,7 C26,2 30,11 24,24Z"/>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="url(#bg)"/>

  <!-- Three blades rotated 120° apart -->
  <use href="#blade" fill="#3789DD" opacity="0.95"/>
  <use href="#blade" fill="#1D9E75" opacity="0.90" transform="rotate(120,24,24)"/>
  <use href="#blade" fill="#3789DD" opacity="0.60" transform="rotate(240,24,24)"/>

  <!-- Subtle outer ring -->
  <circle cx="24" cy="24" r="22.5" fill="none"
          stroke="#3789DD" stroke-width="1.2" opacity="0.30"/>

  <!-- Center hub -->
  <circle cx="24" cy="24" r="4.8" fill="url(#hub)"/>
  <circle cx="24" cy="24" r="2.2" fill="#080d14"/>
</svg>
